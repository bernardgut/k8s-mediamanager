{{ if .Values.sonarr.enabled }}
{{- with .Values.sonarr.volume }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .name }}
  {{ with .annotations }}
  annotations:
  {{- toYaml . | nindent 4 }}
  {{- end }}
  {{ with .labels }}
  labels:
  {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    - {{ .accessModes }}
  resources:
    requests:
      storage: {{ .storage }}
  storageClassName: {{ .storageClassName }}
  {{ with .selector }}
  selector:
  {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
---
### CONFIGMAP
## INIT-CONTAINER
apiVersion: v1
data:
  config.xml: |
    <Config>
      <UrlBase>{{ .Values.sonarr.ingress.path }}</UrlBase>
      <Port>{{ .Values.sonarr.container.port }}</Port>
      <ApiKey>{{ .Values.sonarr.apiKey }}</ApiKey>
      <InstanceName>{{ .Values.sonarr.instanceName }}</InstanceName>
    </Config>
  init-sonarr.sh: |
    #!/bin/sh
    echo "### Initializing config ###"
    if [ ! -f /sonarr-config/config.xml ]; then
      cp -n /init-sonarr/config.xml /sonarr-config/config.xml
      echo "### No configuration found, intialized with default settings ###"
    fi
kind: ConfigMap
metadata:
  name: init-sonarr-cm
---
### DEPLOYMENT
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "k8s-mediamanager.fullname" . }}-sonarr
  labels:
    {{- include "k8s-mediamanager.labels" . | nindent 4 }}
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      {{- include "k8s-mediamanager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "k8s-mediamanager.selectorLabels" . | nindent 8 }}
        app: sonarr
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ include "k8s-mediamanager.serviceAccountName" . }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.general.puid }}
        runAsGroup: {{ .Values.general.pgid }}
        fsGroup: {{ .Values.general.pgid }}
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: config-sonarr
          image: docker.io/alpine:3.20
          command: ["/init-sonarr/init-sonarr.sh"]
          volumeMounts:
            - mountPath: /init-sonarr
              name: init-files-sonarr
            - name: config
              mountPath: /sonarr-config
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          resources:
            requests:
              cpu: "10m"
              memory: "16Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      containers:
        - name: sonarr
          securityContext:
            runAsUser: {{ .Values.general.puid }}
            runAsGroup: {{ .Values.general.pgid }}
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          env:
            - name: PUID
              value: "{{ .Values.general.puid }}"
            - name: PGID
              value: "{{ .Values.general.pgid }}"
            - name: TZ
              value: "{{ .Values.general.timezone }}"
          image: "{{ .Values.sonarr.container.image }}:{{ .Values.sonarr.container.tag }}"
          imagePullPolicy: {{ .Values.sonarr.container.imagePullPolicy }}
          livenessProbe:
            httpGet:
              path: {{ .Values.sonarr.ingress.path }}
              port: {{ .Values.sonarr.container.port }}
            initialDelaySeconds: 15
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.sonarr.ingress.path }}
              port: {{ .Values.sonarr.container.port }}
            initialDelaySeconds: 15
            timeoutSeconds: 10
          ports:
            - name: sonarr-port
              containerPort: {{ .Values.sonarr.container.port }}
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: "/downloads"
              subPath: "{{ .Values.general.sharedStorage.subPaths.downloads }}"
            - name: media
              mountPath: "/tv"
              subPath: "{{ .Values.general.sharedStorage.subPaths.tv }}"
          {{- if .Values.sonarr.extraVolumeMounts }}
            {{- toYaml .Values.sonarr.extraVolumeMounts | nindent 12}}
          {{- end }}
          {{- with .Values.sonarr.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- if .Values.sonarr.metrics.enabled }}
        - name: metrics
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          image: "{{ .Values.radarr.metrics.image }}:{{ .Values.radarr.metrics.imageTag }}"
          imagePullPolicy: {{ .Values.sonarr.metrics.imagePullPolicy }}
          args:
            - sonarr
          env:
            - name: PORT
              value: {{ .Values.sonarr.metrics.port | quote }}
            - name: URL
              value: "http://localhost:{{ .Values.sonarr.container.port }}{{ .Values.sonarr.ingress.path }}"
            - name: APIKEY
              {{- if .Values.sonarr.apiKey }}
              value: {{ .Values.sonarr.apiKey }}
              {{- end }}
              {{- if .Values.sonarr.apiSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sonarr.apiSecret }}
                  key: api-key
              {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.sonarr.metrics.port | default 9090 }}
          livenessProbe:
            httpGet:
              path: /
              port: {{ .Values.sonarr.metrics.port }}
            initialDelaySeconds: 15
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.sonarr.metrics.port }}
            initialDelaySeconds: 15
            timeoutSeconds: 10
        {{- end }}
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: {{ .Values.general.sharedStorage.persistentVolumeClaim.claimName }}
        - name: config
          persistentVolumeClaim:
            claimName: {{ .Values.sonarr.volume.name }}
        - name: init-files-sonarr
          configMap:
            defaultMode: 493
            name: init-sonarr-cm
        {{- if .Values.sonarr.extraVolumes }}
          {{- toYaml .Values.sonarr.extraVolumes | nindent 8}}
        {{- end }}
      {{- with .Values.sonarr.container.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
### SERVICES
apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-mediamanager.fullname" . }}-sonarr
  labels:
    app: sonarr
    {{- include "k8s-mediamanager.labels" . | nindent 4 }}
spec:
  ipFamilyPolicy: {{ .Values.general.ipFamilyPolicy }}
  ipFamilies:
    {{ if .Values.general.ipFamilies }}
    {{- toYaml .Values.general.ipFamilies | nindent 4 }}
    {{- end }}
  type: {{ .Values.sonarr.service.type }}
  ports:
    - port: {{ .Values.sonarr.service.port }}
      targetPort: {{ .Values.sonarr.container.port }}
      protocol: TCP
{{ if eq .Values.sonarr.service.type "NodePort" }}
      nodePort: {{ .Values.sonarr.service.nodePort }}
{{ end }}
      name: sonarr-port
    {{- if .Values.sonarr.metrics.enabled }}
    - port: {{ .Values.sonarr.metrics.port }}
      targetPort: {{ .Values.sonarr.metrics.port }}
      protocol: TCP
      name: metrics
    {{- end }}
  selector:
    app: sonarr
---
### HTTPROUTE
{{ if .Values.sonarr.ingress.enabled }}
{{- if .Values.general.gateway.restricted.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "k8s-mediamanager.fullname" . }}-sonarr
  labels:
    {{- include "k8s-mediamanager.labels" . | nindent 4 }}
    app: sonarr
spec:
  parentRefs:
    - name: {{ .Values.general.gateway.restricted.name }}
      namespace: {{ .Values.general.gateway.restricted.namespace }}
  hostnames:
    - {{ .Values.general.ingress_host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.sonarr.ingress.path }}
      backendRefs:
        - name: {{ include "k8s-mediamanager.fullname" . }}-sonarr
          port: {{ .Values.sonarr.service.port }}
{{- end }}
{{ end }}
---
{{ if .Values.sonarr.metrics.serviceMonitor }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "k8s-mediamanager.fullname" . }}-sonarr
  labels:
    app: sonarr
spec:
  selector:
    matchLabels:
      app: sonarr
  endpoints:
    - port: metrics
      scheme: http
      path: /metrics
{{ end }}
{{ end }}
