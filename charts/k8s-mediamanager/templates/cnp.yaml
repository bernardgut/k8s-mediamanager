{{ if .Values.prowlarr.enabled }}
---
### PROWLARR — ingress from gateway + arr apps, egress to internet (indexers) + byparr (localhost)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "k8s-mediamanager.fullname" . }}-prowlarr
  labels:
    {{- include "k8s-mediamanager.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app: prowlarr
  ingress:
    # From gateway
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: {{ .Values.prowlarr.container.port | quote }}
              protocol: TCP
    # From arr apps (radarr, sonarr, lidarr)
    - fromEndpoints:
        {{- if .Values.radarr.enabled }}
        - matchLabels:
            app: radarr
        {{- end }}
        {{- if .Values.sonarr.enabled }}
        - matchLabels:
            app: sonarr
        {{- end }}
        {{- if .Values.lidarr.enabled }}
        - matchLabels:
            app: lidarr
        {{- end }}
      toPorts:
        - ports:
            - port: {{ .Values.prowlarr.container.port | quote }}
              protocol: TCP
    {{- if .Values.prowlarr.metrics.enabled }}
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: {{ .Values.prowlarr.metrics.port | quote }}
              protocol: TCP
    {{- end }}
  egress:
    # To arr apps (sync indexers)
    {{- if .Values.radarr.enabled }}
    - toEndpoints:
        - matchLabels:
            app: radarr
      toPorts:
        - ports:
            - port: {{ .Values.radarr.container.port | quote }}
              protocol: TCP
    {{- end }}
    {{- if .Values.sonarr.enabled }}
    - toEndpoints:
        - matchLabels:
            app: sonarr
      toPorts:
        - ports:
            - port: {{ .Values.sonarr.container.port | quote }}
              protocol: TCP
    {{- end }}
    {{- if .Values.lidarr.enabled }}
    - toEndpoints:
        - matchLabels:
            app: lidarr
      toPorts:
        - ports:
            - port: {{ .Values.lidarr.container.port | quote }}
              protocol: TCP
    {{- end }}
    # To indexer sites (internet) — Byparr/FlareSolverr is a sidecar (localhost)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
{{ end }}
