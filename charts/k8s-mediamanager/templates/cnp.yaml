{{/*
  CiliumNetworkPolicies for k8s-mediamanager
  
  Strategy:
  1. Default-deny all ingress and egress at namespace level
  2. Allow DNS for all pods
  3. Per-service allow rules for minimum required flows
*/}}

---
### DEFAULT DENY (namespace-wide)
### In Cilium, once any policy selects an endpoint, all traffic not
### explicitly allowed by any policy is denied. This policy selects all
### endpoints but allows nothing, triggering implicit deny for both directions.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "k8s-mediamanager.fullname" . }}-default-deny
  labels:
    {{- include "k8s-mediamanager.labels" . | nindent 4 }}
spec:
  endpointSelector: {}
  ingress: []
  egress: []

---
### ALLOW DNS (all pods)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "k8s-mediamanager.fullname" . }}-allow-dns
  labels:
    {{- include "k8s-mediamanager.labels" . | nindent 4 }}
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP

{{ if .Values.plex.enabled }}
---
### PLEX — ingress from gateway, egress to internet (metadata APIs) + NFS
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "k8s-mediamanager.fullname" . }}-plex
  labels:
    {{- include "k8s-mediamanager.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app: plex
  ingress:
    # From gateway (envoy proxy in cni namespace = cluster entity)
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: {{ .Values.plex.container.port | quote }}
              protocol: TCP
  egress:
    # Plex metadata services + plex.tv authentication
    - toFQDNs:
        - matchPattern: "*.plex.tv"
        - matchPattern: "*.thetvdb.com"
        - matchPattern: "*.themoviedb.org"
        - matchPattern: "*.plex.direct"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
    # Allow streaming to clients (world)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: {{ .Values.plex.container.port | quote }}
              protocol: TCP
{{ end }}

{{ if .Values.plex.tautulli.enabled }}
---
### TAUTULLI — ingress from gateway, egress to plex service + plex.tv (auth) + github (updates)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "k8s-mediamanager.fullname" . }}-tautulli
  labels:
    {{- include "k8s-mediamanager.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app: tautulli
  ingress:
    # From gateway
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: {{ .Values.plex.tautulli.container.port | quote }}
              protocol: TCP
  egress:
    # To Plex service (PMS API)
    - toEndpoints:
        - matchLabels:
            app: plex
      toPorts:
        - ports:
            - port: {{ .Values.plex.container.port | quote }}
              protocol: TCP
    # Plex.tv (authentication, token refresh, user lists, external IP)
    - toFQDNs:
        - matchPattern: "*.plex.tv"
        - matchName: "plex.tv"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    # GitHub (version checks)
    - toFQDNs:
        - matchName: "api.github.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
{{ end }}

{{ if .Values.qbittorrent.enabled }}
---
### QBITTORRENT — ingress from gateway + arr apps, egress to internet (peers + trackers)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "k8s-mediamanager.fullname" . }}-qbittorrent
  labels:
    {{- include "k8s-mediamanager.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app: qbittorrent
  ingress:
    # WebUI from gateway (envoy proxy in cni namespace = cluster entity)
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: {{ .Values.qbittorrent.container.port.webui | quote }}
              protocol: TCP
    # API from *arr apps (radarr, sonarr, lidarr)
    - fromEndpoints:
        {{- if .Values.radarr.enabled }}
        - matchLabels:
            app: radarr
        {{- end }}
        {{- if .Values.sonarr.enabled }}
        - matchLabels:
            app: sonarr
        {{- end }}
        {{- if .Values.lidarr.enabled }}
        - matchLabels:
            app: lidarr
        {{- end }}
      toPorts:
        - ports:
            - port: {{ .Values.qbittorrent.container.port.webui | quote }}
              protocol: TCP
    # Peer traffic inbound
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: {{ .Values.qbittorrent.container.port.peer | quote }}
              protocol: TCP
            - port: {{ .Values.qbittorrent.container.port.peer | quote }}
              protocol: UDP
    {{- if .Values.qbittorrent.metrics.enabled }}
    # Metrics scraping
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: {{ .Values.qbittorrent.metrics.containerPort | quote }}
              protocol: TCP
    {{- end }}
  egress:
    # Peer traffic + trackers (internet)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: {{ .Values.qbittorrent.container.port.peer | quote }}
              protocol: TCP
            - port: {{ .Values.qbittorrent.container.port.peer | quote }}
              protocol: UDP
    # Tracker traffic (HTTP/HTTPS)
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "80"
              protocol: TCP
{{ end }}

{{ if .Values.radarr.enabled }}
---
### RADARR — ingress from gateway + prowlarr, egress to qbittorrent + internet (metadata)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "k8s-mediamanager.fullname" . }}-radarr
  labels:
    {{- include "k8s-mediamanager.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels:
      app: radarr
  ingress:
    # From gateway
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: {{ .Values.radarr.container.port | quote }}
              protocol: TCP
    # From prowlarr (sync)
    {{- if .Values.prowlarr.enabled }}
    - fromEndpoints:
        - matchLabels:
            app: prowlarr
      toPorts:
        - ports:
            - port: {{ .Values.radarr.container.port | quote }}
              protocol: TCP
    {{- end }}
    {{- if .Values.radarr.metrics.enabled }}
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: {{ .Values.radarr.metrics.port | quote }}
              protocol: TCP
    {{- end }}
  egress:
    # To qBittorrent (download client)
    {{- if .Values.qbittorrent.enabled }}
    - toEndpoints:
        - matchLabels:
            app: qbittorrent
      toPorts:
        - ports:
            - port: {{ .Values.qbittorrent.container.port.webui | quote }}
              protocol: TCP
    {{- end }}
    # To prowlarr (indexer queries)
    {{- if .Values.prowlarr.enabled }}
    - toEndpoints:
        - matchLabels:
            app: prowlarr
      toPorts:
        - ports:
            - port: {{ .Values.prowlarr.container.port | quote }}
              protocol: TCP
    {{- end }}
    # Metadata APIs
    - toFQDNs:
        - matchPattern: "*.themoviedb.org"
        - matchPattern: "api.radarr.video"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
{{ end }}

