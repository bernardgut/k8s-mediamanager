# ──────────────────────────────────────────────────────────────────────────────
# Transmission (torrent client — disabled by default)
# ──────────────────────────────────────────────────────────────────────────────
transmission:
  enabled: false

  image:
    repository: ghcr.io/home-operations/transmission
    tag: rolling
    pullPolicy: IfNotPresent

  service:
    rpc:
      type: ClusterIP
      port: 9091
      nodePort:
    peer:
      type: LoadBalancer
      port: 11413
      nodePort:
      nodePortUDP:

  ingress:
    enabled: true
    path: /transmission
    annotations: {}
    tls:
      enabled: false
      secretName: ""

  config:
    auth:
      enabled: true
      username: "admin"
      password: "changeme1234"

  persistence:
    existingClaim: ""
    size: 1Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    annotations:
      helm.sh/resource-policy: keep

  resources:
    requests:
      cpu: "100m"
      memory: "320Mi"
    limits:
      cpu: "1"
      memory: "4Gi"

  nodeSelector: {}
  extraVolumes: []
  extraVolumeMounts: []

  metrics:
    enabled: true
    image:
      repository: docker.io/evanofslack/transmission-exporter
      tag: latest
      pullPolicy: Always
    serviceMonitor: true
    port: 19091

# ──────────────────────────────────────────────────────────────────────────────
# qBittorrent (torrent client)
# ──────────────────────────────────────────────────────────────────────────────
qbittorrent:
  enabled: true

  image:
    repository: ghcr.io/home-operations/qbittorrent
    tag: rolling
    pullPolicy: Always

  service:
    webui:
      type: ClusterIP
      port: 8080
      nodePort:
    peer:
      type: LoadBalancer
      port: 11413
      nodePort:
      nodePortUDP:
      ipFamilyPolicy: PreferDualStack
      ipFamilies:
        - IPv6
        - IPv4

  ingress:
    enabled: true
    path: /
    annotations: {}
    tls:
      enabled: false
      secretName: ""

  config:
    auth:
      username: "admin"
      password: "changeme1234"

  persistence:
    existingClaim: ""
    size: 10Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    annotations:
      helm.sh/resource-policy: keep

  cache:
    enabled: false
    size: "20Gi"
    storageClassName: ""

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "4"
      memory: "24Gi"

  nodeSelector: {}
  extraVolumes: []
  extraVolumeMounts: []

  metrics:
    enabled: true
    image:
      repository: ghcr.io/caseyscarborough/qbittorrent-exporter
      tag: v1.3.5
      pullPolicy: IfNotPresent
    serviceMonitor: true
    containerPort: 17871
    port: 9091
