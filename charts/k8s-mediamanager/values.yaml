# Default values for k8s-mediamanager.
# This is a YAML-formatted file.

# ──────────────────────────────────────────────────────────────────────────────
# Global settings shared by all services
# ──────────────────────────────────────────────────────────────────────────────
global:
  # UID/GID to run all service processes with
  puid: 1000
  pgid: 1000
  # Timezone for all services
  timezone: "Etc/UTC"
  # Default IP family policy for services ['SingleStack','PreferDualStack','RequireDualStack']
  ipFamilyPolicy: SingleStack
  # IP families for services — leave empty for auto, or set e.g. ['IPv4','IPv6']
  ipFamilies: []
  # Init container image used by all *arr services
  initImage:
    repository: docker.io/alpine
    tag: "3.20"
    pullPolicy: IfNotPresent

# ──────────────────────────────────────────────────────────────────────────────
# Service account
# ──────────────────────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  automount: false
  annotations: {}
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# ──────────────────────────────────────────────────────────────────────────────
# Shared media storage (NFS / ReadWriteMany PVC)
# ──────────────────────────────────────────────────────────────────────────────
sharedStorage:
  annotations:
    # Retain the PV on helm uninstall by default
    helm.sh/resource-policy: keep
  labels: {}
  accessModes:
    - ReadWriteMany
  size: 5Gi
  storageClassName: ""
  existingClaim: "media-pvc"
  selector: {}
  # Sub-paths within the shared volume for media libraries
  subPaths:
    tv: media/tv
    movies: media/movies
    music: media/music
    downloads: downloads

# ──────────────────────────────────────────────────────────────────────────────
# Gateway API configuration (replaces legacy Ingress)
# ──────────────────────────────────────────────────────────────────────────────
gateway:
  # Restricted gateway for internal services (arr apps, tautulli, qBittorrent WebUI)
  restricted:
    enabled: false
    name: "restricted-home-gateway"
    namespace: "cni"
    hostname: "k8s-mediamanager.k8s.test"
  # Public gateway for externally-accessible services (Plex)
  public:
    enabled: false
    name: "public-gateway"
    namespace: "cni"
    hostname: "k8s-plex.k8s.test"

# ──────────────────────────────────────────────────────────────────────────────
# Plex Media Server
# ──────────────────────────────────────────────────────────────────────────────
plex:
  enabled: true
  # Plex claim token from https://plex.tv/claim
  claim: "CHANGEME"
  hardwareAcceleration: false
  replicaCount: 1

  image:
    repository: ghcr.io/home-operations/plex
    tag: rolling
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 32400
    nodePort:    # Only used when type=NodePort

  ingress:
    enabled: true
    annotations: {}
    tls:
      enabled: false
      secretName: ""

  persistence:
    existingClaim: ""
    size: 200Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    annotations:
      helm.sh/resource-policy: keep

  resources:
    requests:
      cpu: "150m"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "16Gi"

  nodeSelector: {}

  # Memory-backed transcode volume
  transcode:
    enabled: true
    sizeLimit: "14Gi"

  extraVolumes: []
  extraVolumeMounts: []

# ──────────────────────────────────────────────────────────────────────────────
# Tautulli (Plex monitoring — promoted to top-level)
# ──────────────────────────────────────────────────────────────────────────────
tautulli:
  enabled: true

  image:
    repository: ghcr.io/tautulli/tautulli
    tag: v2.16.0
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 8181
    nodePort:

  ingress:
    enabled: true
    path: /tautulli
    annotations: {}
    tls:
      enabled: false
      secretName: ""

  persistence:
    existingClaim: ""
    size: 10Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    annotations:
      helm.sh/resource-policy: keep

  resources:
    requests:
      cpu: "150m"
      memory: "96Mi"
    limits:
      cpu: "250m"
      memory: "512Mi"

  nodeSelector: {}
  extraVolumes: []
  extraVolumeMounts: []

# ──────────────────────────────────────────────────────────────────────────────
# Prowlarr (indexer manager)
# ──────────────────────────────────────────────────────────────────────────────
prowlarr:
  enabled: true
  apiKey: "2ed654b2c1be4f51bde5981e70687b27"
  instanceName: Prowlarr

  image:
    repository: ghcr.io/home-operations/prowlarr
    tag: rolling
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 9696
    nodePort:

  ingress:
    enabled: true
    path: /prowlarr
    annotations: {}
    tls:
      enabled: false
      secretName: ""

  persistence:
    existingClaim: ""
    size: 10Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    annotations:
      helm.sh/resource-policy: keep

  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "1Gi"

  nodeSelector: {}
  extraVolumes: []
  extraVolumeMounts: []

  # Byparr/FlareSolverr sidecar for CAPTCHA solving
  flaresolverr:
    enabled: true
    image:
      repository: ghcr.io/thephaseless/byparr
      tag: latest
      pullPolicy: Always
    port: 8191
    nodeSelector: {}

  metrics:
    enabled: true
    image:
      repository: ghcr.io/onedr0p/exportarr
      tag: v2.3.0
      pullPolicy: IfNotPresent
    serviceMonitor: true
    port: 9090
    flaresolverrMetricsPort: 9191
    backfill: true

# ──────────────────────────────────────────────────────────────────────────────
# Radarr (movies)
# ──────────────────────────────────────────────────────────────────────────────
radarr:
  enabled: true
  apiKey: "6a531c2df0144dbaa270892fba460d21"
  instanceName: Radarr

  image:
    repository: ghcr.io/home-operations/radarr
    tag: rolling
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 7878
    nodePort:

  ingress:
    enabled: true
    path: /radarr
    annotations: {}
    tls:
      enabled: false
      secretName: ""

  persistence:
    existingClaim: ""
    size: 10Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    annotations:
      helm.sh/resource-policy: keep

  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "4Gi"

  nodeSelector: {}
  extraVolumes: []
  extraVolumeMounts: []

  # Media sub-paths this service needs from sharedStorage
  mediaSubPaths:
    - mountPath: /downloads
      subPath: downloads
    - mountPath: /movies
      subPath: media/movies

  metrics:
    enabled: true
    image:
      repository: ghcr.io/onedr0p/exportarr
      tag: v2.3.0
      pullPolicy: IfNotPresent
    serviceMonitor: true
    port: 9090

